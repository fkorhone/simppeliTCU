name: Build

on:
  push:
    branches: [ "**" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Compile Sketch
      uses: arduino/compile-sketches@v1
      with:
        fqbn: esp32:esp32:esp32s3:CDCOnBoot=cdc
        sketch-paths: |
          simppeliTCU
        cli-compile-flags: |
          - --export-binaries
        libraries: |
          - name: PubSubClient

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: simppeliTCU-firmware
        path: simppeliTCU/build/
    